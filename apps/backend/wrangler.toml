# good-techstack — wrangler.toml
# The agent updates database_id and vars after provisioning.

name = "talk-backend"
main = "src/index.ts"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "talkroom-db"
database_id = "38616823-7686-4b06-a13d-bb441fb3ca4c"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "talkroom-images"

[vars]
BETTER_AUTH_URL = ""
BETTER_AUTH_SECRET = ""

[[durable_objects.bindings]]
name = "CHAT_ROOMS"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[observability]
enabled = true
