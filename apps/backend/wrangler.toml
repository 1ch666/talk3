# good-techstack — wrangler.toml
# The agent updates database_id and vars after provisioning.

name = "talk-backend"
main = "src/index.ts"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "talkroom-db"
database_id = "38616823-7686-4b06-a13d-bb441fb3ca4c"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "IMAGES"
id = "5c34fdeb15a84e299d9d0d87dafdac8b"

[[ratelimits]]
name = "ROOM_CREATE_RATE_LIMITER"
namespace_id = "2026072301"

  [ratelimits.simple]
  limit = 5
  period = 60

[[ratelimits]]
name = "API_RATE_LIMITER"
namespace_id = "2026072302"

  [ratelimits.simple]
  limit = 120
  period = 60

[[ratelimits]]
name = "ROOM_IMAGE_RATE_LIMITER"
namespace_id = "2026072303"

  [ratelimits.simple]
  limit = 10
  period = 60

[[ratelimits]]
name = "SOCKET_RATE_LIMITER"
namespace_id = "2026072304"

  [ratelimits.simple]
  limit = 30
  period = 60

[[durable_objects.bindings]]
name = "CHAT_ROOMS"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[observability]
enabled = true
