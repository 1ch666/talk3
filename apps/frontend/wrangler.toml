name = "talkroom"
main = "worker-entry.js"
compatibility_date = "2026-07-12"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/client"
binding = "ASSETS"
run_worker_first = true

[[services]]
binding = "BACKEND"
service = "talk-backend"

[[rules]]
type = "ESModule"
globs = ["dist/server/**/*.js"]
fallthrough = true
